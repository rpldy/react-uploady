name: Uploady Build

on:
    workflow_dispatch:
    pull_request:
    push:
        branches:
            - master

defaults:
    run:
        shell: bash

permissions:
    contents: read
    pull-requests: read
    actions: read
    checks: read

jobs:
    code-changes:
        runs-on: ubuntu-latest
        outputs:
            IS_CODE_CHANGED: ${{ steps.check-changes.outputs.code_changed }}
        steps:
            -   name: Checkout
                uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
                with:
                    fetch-depth: 2
            -   name: Check for code changes
                id: check-changes
                run: |
                    if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
                      echo "code_changed=true" >> $GITHUB_OUTPUT
                      exit 0
                    fi

                    if [ "${{ github.event_name }}" == "pull_request" ]; then
                      git fetch origin ${{ github.base_ref }} --depth=1
                      CHANGED_FILES=$(git diff --name-only origin/${{ github.base_ref }}..HEAD)
                    else
                      CHANGED_FILES=$(git diff --name-only HEAD^ HEAD)
                    fi

                    echo "Changed files:"
                    echo "$CHANGED_FILES"

                    if echo "$CHANGED_FILES" | grep -q -E '^packages/|^cypress/|^package.json$|^story-helpers/'; then
                      echo "Code changes detected in watched paths"
                      echo "code_changed=true" >> $GITHUB_OUTPUT
                    else
                      echo "No code changes in watched paths"
                      echo "code_changed=false" >> $GITHUB_OUTPUT
                    fi

    prep-e2e:
        runs-on: ubuntu-latest
        needs:
            - code-changes
        if: ${{ needs.code-changes.outputs.IS_CODE_CHANGED == 'true' }}
        steps:
            -   name: Checkout
                uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
            -   name: Prepare
                uses: ./.github/actions/prepare
                with:
                    with-cypress: true
                    with-frozen: true
            -   name: Install dependencies
                uses: cypress-io/github-action@dace029018fcdf86e0df89a31bc3cfa5b32570d8 # v7.3.0
                with:
                    runTests: false

    build:
        name: Build Library
        runs-on: ubuntu-latest
        steps:
            -   name: Checkout
                uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
            -   name: Prepare
                uses: ./.github/actions/prepare
                with:
                    with-cypress: true
                    with-frozen: true
            -   name: Build
                run: pnpm build

    bundle:
        name: Create code bundles
        runs-on: ubuntu-latest
        permissions:
            pull-requests: write
            contents: write
            actions: read
        steps:
            -   name: Checkout
                uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
            -   name: Prepare
                uses: ./.github/actions/prepare
                with:
                    with-cypress: true
                    with-frozen: true
            -   name: Bundle for Production
                run: |
                    pnpm bundle:prod
            -   name: Cache Bundle Folder
                id: cache-bundle
                uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
                with:
                    path: bundle
                    key: bundle-${{ runner.os }}-${{ hashFiles('bundle/**') }}
            -   name: Bundle Size Check (Overweight)
                uses: yoavniran/overweight@ee294a046ad2637d648b7b9c67e34928c93c7806 # v1
                with:
                    github-token: ${{ secrets.GITHUB_TOKEN }}
                    update-baseline: true
                    report-file: overweight-report.json
                    baseline-protected-branches: "master"
                    comment-on-pr-each-run: true

    sb:
        name: Build Storybook
        runs-on: ubuntu-latest
        steps:
            -   name: Checkout
                uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
            -   name: Prepare
                uses: ./.github/actions/prepare
                with:
                    with-cypress: true
                    with-frozen: true
            -   name: build storybook
                run: pnpm sb:build:internal
            -   name: Cache SB Build
                id: cache-sb
                uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
                with:
                    path: .sb-static
                    key: sb-static-${{ hashFiles('lerna.json') }}-${{ github.run_id }}

    lft:
        name: Lint, Flow, Types
        runs-on: ubuntu-latest
        steps:
            -   name: Checkout
                uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
            -   name: Prepare
                uses: ./.github/actions/prepare
                with:
                    with-cypress: true
                    with-frozen: true
            -   name: lft
                run: pnpm test:ci

    unit-test:
        name: Unit-Test (Vitest)
        runs-on: ubuntu-latest
        environment: "Rpldy-Build"
        permissions:
            contents: read
            pull-requests: write
            checks: write
            actions: read
        steps:
            -   name: Checkout
                uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
            -   name: Prepare
                uses: ./.github/actions/prepare
                with:
                    with-cypress: true
                    with-frozen: true
            -   name: unit-test
                run: pnpm vitest:ci
            -   name: Show Report Coverage
                uses: davelosert/vitest-coverage-report-action@02f3c2e641286b7fa308cd3e430783103ce6103b # v2
            -   name: Test Report
                uses: dorny/test-reporter@df6247429542221bc30d46a036ee47af1102c451 # v2
                if: success() || failure()
                with:
                    name: Unit-test Report
                    path: reports/junit/js-*.xml
                    reporter: jest-junit
                    badge-title: 'unit tests'
                env:
                    GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
            -   name: Upload Coverage (master only)
                uses: codecov/codecov-action@b9fd7d16f6d7d1b5d2bec1a2887e65ceed900238 # v4
                if: ${{ github.ref_name == 'master' }}
                with:
                    token: ${{ secrets.CODECOV_TOKEN }}
                    files: ./coverage/coverage-final.json
                    fail_ci_if_error: true
                    verbose: true

    e2e:
        runs-on: ubuntu-latest
        needs:
            - prep-e2e
            - bundle
            - sb
            - code-changes
        if: ${{ needs.code-changes.outputs.IS_CODE_CHANGED == 'true' }}
        permissions:
            contents: write
            checks: write
            actions: write
            pull-requests: read
        steps:
            -   name: Checkout PR
                uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
                if: ${{ github.ref_name != 'master' }}
                with:
                    ref: ${{ github.head_ref }}
                    fetch-depth: 0
            -   name: Checkout
                uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
                if: ${{ github.ref_name == 'master' }}

            -   name: Prepare
                uses: ./.github/actions/prepare
                with:
                    with-cypress: true
                    with-frozen: true
            -   name: Restore SB Build Cache
                uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
                with:
                    path: .sb-static
                    key: sb-static-${{ hashFiles('lerna.json') }}-${{ github.run_id }}
                    restore-keys: sb-static-${{ hashFiles('lerna.json') }}-
            -   name: Restore Bundle Cache
                uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
                with:
                    path: bundle
                    key: bundle-${{ runner.os }}-
                    restore-keys: bundle-${{ runner.os }}-
            -   name: Cypress run
                id: cypress-e2e
                uses: cypress-io/github-action@dace029018fcdf86e0df89a31bc3cfa5b32570d8 # v7.3.0
                with:
                    install: false
                    start: |
                        pnpm sb:serve
                        pnpm bundle:serve
                    wait-on: 'http://127.0.0.1:8001, http://127.0.0.1:8009'
                    command: pnpm cy:parallel:gh
            -   name: Check for GIT Changes (Weights File)
                id: check-weights-changes
                if:  ${{ github.ref_name != 'master' && steps.cypress-e2e.outcome == 'success' }}
                run: |
                    if [[ `git status --porcelain` ]]; then
                        echo "found changes to weights file!"
                        echo "WEIGHTS_HAS_CHANGES=true" >> $GITHUB_OUTPUT
                    else
                        echo "NO changes to weights file!"
                    fi
            -   name: Commit Weights File (only if there was a change)
                if:  ${{ steps.check-weights-changes.outputs.WEIGHTS_HAS_CHANGES == 'true' }}
                run: |
                    git config user.email "ci@react-uploady.org"
                    git config user.name "Uploady CI"
                    git status
                    git add cypress/e2e-weights.json
                    git commit -m "chore: update e2e weights file"
                    git push
            -   name: Store screenshots
                uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
                if: failure()
                with:
                    name: cypress-screenshots
                    path: cypress/screenshots
                    if-no-files-found: ignore
            -   name: E2E Report
                uses: dorny/test-reporter@df6247429542221bc30d46a036ee47af1102c451 # v2
                if: success() || failure()
                with:
                    name: E2E Report
                    path: cypress/results/results-*.xml
                    reporter: java-junit
                    badge-title: 'E2E tests'
